<div class="admin-team-container">
  <h2>Team Members</h2>
  <button mat-flat-button color="primary" (click)="openCreateDialog()">
    <mat-icon>person_add</mat-icon> Add Member
  </button>

  <div *ngIf="loading">Loading team members...</div>

  <div *ngIf="!loading && team.length === 0" class="empty-message">
    No team members found.
  </div>

  <div class="team-grid" *ngIf="!loading && team.length">
    <div class="team-card" *ngFor="let member of team">
      <img class="avatar" [src]="member.image" [alt]="member.name" />
      <h3>{{ member.name }}</h3>
      <p class="bio">{{ member.bio }}</p>

      <div class="social-icons">
        <a
          *ngIf="member.facebook"
          [href]="member.facebook"
          target="_blank"
          aria-label="Facebook"
        >
          <img src="assets/icons/facebook.svg" alt="Facebook" />
        </a>
        <a
          *ngIf="member.twitter"
          [href]="member.twitter"
          target="_blank"
          aria-label="Twitter"
        >
          <img src="assets/icons/x.svg" alt="Twitter" />
        </a>
        <a
          *ngIf="member.instagram"
          [href]="member.instagram"
          target="_blank"
          aria-label="Instagram"
        >
          <img src="assets/icons/instagram.svg" alt="Instagram" />
        </a>
        <a
          *ngIf="member.linkedin"
          [href]="member.linkedin"
          target="_blank"
          aria-label="LinkedIn"
        >
          <img src="assets/icons/linkedin.svg" alt="LinkedIn" />
        </a>
      </div>

      <div class="actions">
        <button mat-icon-button color="accent" (click)="openEditDialog(member)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteMember(member.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
