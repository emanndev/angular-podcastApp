<h2>Team Members</h2>
<div class="team-grid">
  <div class="team-card" *ngFor="let member of team">
    <img [src]="member.image" alt="{{ member.name }}" class="avatar" />
    <h4>{{ member.name }}</h4>
    <p>{{ member.bio }}</p>
    <div class="social-icons">
      <a *ngIf="member.facebook" [href]="member.facebook" target="_blank">📘</a>
      <a *ngIf="member.twitter" [href]="member.twitter" target="_blank">🐦</a>
      <a *ngIf="member.instagram" [href]="member.instagram" target="_blank"
        >📸</a
      >
      <a *ngIf="member.linkedin" [href]="member.linkedin" target="_blank">💼</a>
    </div>
  </div>
</div>
