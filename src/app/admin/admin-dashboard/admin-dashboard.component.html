<h1 class="welcome-title">Welcome, Admin 👋</h1>
<div class="dashboard-grid">
  <a routerLink="/admin/confessions" class="dashboard-card">📬 Confessions</a>
  <a routerLink="/admin/playlists" class="dashboard-card">📁 Playlists</a>
  <a routerLink="/admin/team" class="dashboard-card">👥 Team</a>
</div>

<div class="dashboard-container">
  <!-- Summary Cards -->
  <div class="dashboard-stats">
    <div class="stat-card">
      <h3>Total Confessions</h3>
      <p>{{ stats.confessions }}</p>
    </div>
    <div class="stat-card">
      <h3>Total Playlists</h3>
      <p>{{ stats.playlists }}</p>
    </div>
    <div class="stat-card">
      <h3>Total Team</h3>
      <p>{{ stats.team }}</p>
    </div>
  </div>

  <!-- Latest Confessions -->
  <div class="section">
    <div class="section-header">
      <h4>Recent Confessions</h4>
      <button routerLink="/admin/confessions">View All</button>
    </div>
    <ul *ngIf="recentConfessions.length > 0; else noConfessions">
      <li *ngFor="let confession of recentConfessions">
        <p>{{ confession.message }}</p>
        <span>{{ confession.created_at | date : "short" }}</span>
      </li>
    </ul>
    <ng-template #noConfessions>
      <p>No recent confessions found.</p>
    </ng-template>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button routerLink="/admin/playlists/create">+ New Playlist</button>
    <button routerLink="/admin/team/create">+ New Team Member</button>
  </div>
</div>
