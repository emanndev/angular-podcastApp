<!-- admin-dashboard.component.html -->
<div class="admin-layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <h2 class="sidebar-title">MicDrop Admin</h2>
    <ul class="nav-links">
      <li><a routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a></li>
      <li><a routerLink="/admin/confessions" routerLinkActive="active">Confessions</a></li>
      <li><a routerLink="/admin/episodes" routerLinkActive="active">Episodes</a></li>
      <li><a routerLink="/admin/playlists" routerLinkActive="active">Playlists</a></li>
      <li><a routerLink="/admin/team" routerLinkActive="active">Team</a></li>
      <li><a (click)="logout()">Logout</a></li>
    </ul>
  </nav>

  <!-- Content Area -->
  <div class="main-content">
    <h1 class="welcome-title">Welcome, Admin 👋</h1>
    <div class="dashboard-grid">
      <a routerLink="/admin/confessions" class="dashboard-card">📬 Confessions</a>
      <a routerLink="/admin/episodes" class="dashboard-card">🎙️ Episodes</a>
      <a routerLink="/admin/playlists" class="dashboard-card">📁 Playlists</a>
      <a routerLink="/admin/team" class="dashboard-card">👥 Team</a>
    </div>
  </div>
</div>
