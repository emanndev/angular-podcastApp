<div class="admin-episodes-container">
  <h2>All Episodes</h2>
  <!-- Episode Cards -->
  <div class="episode-card-grid">
    <div class="episode-card" *ngFor="let episode of paginatedEpisodes">
      <img class="episode-img" [src]="episode.img_url" alt="Episode Image" />
      <h3>{{ episode.title }}</h3>
      <p>{{ episode.description }}</p>
      <p><strong>Duration:</strong> {{ episode.duration }}</p>
      <p>
        <strong>Season:</strong> {{ episode.season }}, Episode
        {{ episode.episode }}
      </p>
      <p><strong>Posted:</strong> {{ episode.posted_on | date : "medium" }}</p>

      <div class="platform-links">
        <a
          *ngIf="episode.spotify_url"
          [href]="episode.spotify_url"
          target="_blank"
          >🎧 Spotify</a
        >
        <a
          *ngIf="episode.apple_podcasts_url"
          [href]="episode.apple_podcasts_url"
          target="_blank"
          >🍎 Apple</a
        >
      </div>

      <audio controls [src]="episode.audio_url"></audio>

      <div class="episode-actions">
        <button (click)="editEpisode(episode.id)">Edit</button>
        <button (click)="deleteEpisode(episode.id)">Delete</button>
      </div>
    </div>

    <!-- Pagination Controls -->
    <div class="pagination">
      <button (click)="prevPage()" [disabled]="currentPage === 1">Prev</button>

      <button
        *ngFor="let page of [].constructor(totalPages); let i = index"
        (click)="goToPage(i + 1)"
        [class.active]="currentPage === i + 1"
      >
        {{ i + 1 }}
      </button>

      <button (click)="nextPage()" [disabled]="currentPage === totalPages">
        Next
      </button>
    </div>
  </div>
</div>
