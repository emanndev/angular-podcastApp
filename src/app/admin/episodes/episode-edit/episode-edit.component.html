<button (click)="goBack()" class="back-btn">← Go Back</button>

<div class="episode-form">
  <h2>{{ isEdit ? "Edit" : "Create" }} Episode</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <label>Title</label>
    <input formControlName="title" type="text" />

    <label>Description</label>
    <textarea formControlName="description"></textarea>

    <label>Audio URL</label>
    <input formControlName="audio_url" type="text" />

    <label>Image URL</label>
    <input formControlName="img_url" type="text" />

    <label>Duration</label>
    <input formControlName="duration" type="text" placeholder="e.g. 00:45:30" />

    <label>Posted On</label>
    <input formControlName="posted_on" type="datetime-local" />

    <label>Season</label>
    <input formControlName="season" type="number" />

    <label>Episode Number</label>
    <input formControlName="episode" type="number" />

    <label>Spotify URL</label>
    <input formControlName="spotify_url" type="text" />

    <label>Apple Podcasts URL</label>
    <input formControlName="apple_podcasts_url" type="text" />

    <button type="submit">{{ isEdit ? "Update" : "Create" }} Episode</button>
  </form>
</div>
