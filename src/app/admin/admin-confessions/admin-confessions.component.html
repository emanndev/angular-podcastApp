<div class="admin-confessions">
  <div class="confessions-header">
    <h2>Confessions</h2>
    <input type="text" [(ngModel)]="search" placeholder="Search message..." class="search-input" />
  </div>

  <div *ngIf="loading" class="loader">Loading confessions...</div>

  <table *ngIf="!loading && filteredConfessions.length > 0" class="confessions-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Message</th>
        <th>Submitted</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of filteredConfessions; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ c.message }}</td>
        <td>{{ c.created_at | date : "short" }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && filteredConfessions.length === 0" class="no-data">
    <p>No confessions found.</p>
  </div>
</div>
