<h2 mat-dialog-title>
  {{ data ? "Edit Team Member" : "New Team Member" }}
</h2>

<mat-dialog-content [formGroup]="form">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Name</mat-label>
    <input matInput formControlName="name" required />
    <mat-error *ngIf="form.get('name')?.hasError('required')">
      Required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Image URL</mat-label>
    <input matInput formControlName="image" required />
    <mat-error *ngIf="form.get('image')?.hasError('required')">
      Required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Bio</mat-label>
    <textarea matInput formControlName="bio" rows="4" required></textarea>
    <mat-error *ngIf="form.get('bio')?.hasError('required')">
      Required
    </mat-error>
  </mat-form-field>

  <!-- Optional socials -->
  <mat-form-field
    appearance="outline"
    class="full-width"
    *ngFor="let social of ['facebook', 'twitter', 'instagram', 'linkedin']"
  >
    <mat-label>{{ social | titlecase }} URL</mat-label>
    <input matInput [formControlName]="social" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="submit()"
    [disabled]="form.invalid"
  >
    {{ data ? "Update" : "Create" }}
  </button>
</mat-dialog-actions>
